<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Privilege Escalation Demo — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #0f1117;
      --border:    #1e2230;
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --red:       #ef4444;
      --green:     #22c55e;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --card:      #141620;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 500px; height: 500px; top: -100px; left: -100px; background: #3b82f6; }
    .orb2 { width: 400px; height: 400px; bottom: -80px; right: -80px; background: #6366f1; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    /* Terminal header */
    .terminal-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red    { background: #ef4444; }
    .dot-yellow { background: #f59e0b; }
    .dot-green  { background: #22c55e; }
    .terminal-title {
      margin-left: auto;
      margin-right: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      padding: 36px 36px 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    .badge span { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    input::placeholder { color: #334155; }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
    .btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); opacity: 1; }

    #error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0 18px;
    }

    .hint { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .users-grid { display: flex; flex-direction: column; gap: 6px; }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .user-chip:hover { border-color: var(--accent); }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .avatar-admin  { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .avatar-alice  { background: linear-gradient(135deg, #3b82f6, #6366f1); }
    .avatar-bob    { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .user-info { flex: 1; }
    .user-name { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }
    .user-role { font-size: 11px; color: var(--muted); }
    .user-pass { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--yellow); }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">
    <div class="terminal-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="terminal-title">privilege-escalation-demo — bash</span>
    </div>
    <div class="card">
      <div class="badge"><span></span> LIVE DEMO</div>
      <h1>System Login</h1>
      <p class="subtitle">Privilege Escalation Demo · EH Project</p>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="alice" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••" />
        </div>
        <button type="submit" class="btn">→ Login</button>
        <div id="error-msg"></div>
      </form>

      <hr class="divider" />

      <p class="hint">⚡ Quick login — click to autofill:</p>
      <div class="users-grid">
        <div class="user-chip" onclick="fillCreds('admin','admin123')">
          <div class="user-avatar avatar-admin">A</div>
          <div class="user-info">
            <div class="user-name">admin</div>
            <div class="user-role">Administrator</div>
          </div>
          <div class="user-pass">admin123</div>
        </div>
        <div class="user-chip" onclick="fillCreds('alice','1234')">
          <div class="user-avatar avatar-alice">A</div>
          <div class="user-info">
            <div class="user-name">alice</div>
            <div class="user-role">Regular User (id: 2)</div>
          </div>
          <div class="user-pass">1234</div>
        </div>
        <div class="user-chip" onclick="fillCreds('bob','1234')">
          <div class="user-avatar avatar-bob">B</div>
          <div class="user-info">
            <div class="user-name">bob</div>
            <div class="user-role">Regular User (id: 3)</div>
          </div>
          <div class="user-pass">1234</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function fillCreds(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
      document.getElementById('username').focus();
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = '✗ ' + (data.error || 'Login failed');
          errEl.style.display = 'block';
          return;
        }

        // Store user info in localStorage for UI display
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = '✗ Network error — is the server running?';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
